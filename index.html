<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello Sridhar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 60px;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid #22c55e;
    }

    h1 {
      margin-top: 15px;
    }

    .link {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 250px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .link:hover {
      background: #16a34a;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    
    <img src="https://via.placeholder.com/120" alt="profile">
    
    <h1>Hello Sridhar</h1>
    <p>Welcome to my world</p>

    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">YouTube</a>
    <a class="link" href="#">My Projects</a>

  </div>
</body>
</html>
