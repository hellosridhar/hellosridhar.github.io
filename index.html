<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Sridhar</title>

<!-- Favicon -->
<link rel="icon" href="sridhar01.png">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  text-align: center;
  color: white;
  background: linear-gradient(270deg, #0f172a, #1e293b, #020617);
  background-size: 600% 600%;
  animation: bg 15s ease infinite;
}

/* Background animation */
@keyframes bg {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

/* Container */
.container {
  margin-top: 60px;
  padding: 20px;
  animation: fadeUp 1s ease forwards;
}

/* Fade up */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Profile */
.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid #22c55e;
  box-shadow: 0 0 20px #22c55e;
  animation: pulse 3s infinite;
}

/* Pulse */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 20px #22c55e; }
  50% { box-shadow: 0 0 35px #22c55e; }
}

h1 {
  margin-top: 15px;
}

p {
  margin-top: 8px;
  opacity: 0.8;
}

/* Buttons container */
.links {
  margin-top: 30px;
}

/* Base button */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 260px;
  margin: 15px auto;
  padding: 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  position: relative;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  transition: 0.3s;
  animation: fadeUp 0.6s ease forwards;
}

/* Stagger */
.btn:nth-child(1){animation-delay:0.1s}
.btn:nth-child(2){animation-delay:0.2s}
.btn:nth-child(3){animation-delay:0.3s}

/* Hover */
.btn:hover {
  transform: translateY(-3px) scale(1.03);
}

/* Click press */
.btn:active {
  transform: scale(0.95);
}

/* Glow border */
.btn::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 12px;
  filter: blur(10px);
  opacity: 0.4;
  z-index: -1;
}

/* Platform colors */
.youtube::before { background: red; }
.instagram::before { background: linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7); }
.discord::before { background: #5865F2; }

/* Hover fill */
.youtube:hover { background: red; }
.instagram:hover { background: linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7); }
.discord:hover { background: #5865F2; }

/* YouTube special */
.mainYT {
  cursor: pointer;
  animation: glowPulse 2s infinite;
}

@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 10px red; }
  50% { box-shadow: 0 0 25px red; }
}

/* Sub buttons */
.subs {
  display: none;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
  animation: fadeUp 0.5s ease forwards;
}

.sub-btn {
  width: 140px;
  padding: 12px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.08);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-weight: bold;
  transition: 0.3s;
}

.sub-btn small {
  font-size: 12px;
  opacity: 0.8;
}

.sub-btn::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 12px;
  background: red;
  filter: blur(8px);
  opacity: 0.4;
  z-index: -1;
}

.sub-btn:hover {
  background: red;
  transform: scale(1.05);
}

/* Active state */
.active .mainYT {
  display: none;
}
.active .subs {
  display: flex;
}

/* Mobile */
@media (max-width: 400px){
  .btn { width: 90%; }
}
</style>
</head>

<body>

<div class="container">

<img src="sridhar01.png" class="profile">

<h1>Hello Sridhar</h1>
<p>Do What you Love with Mental Peace ☮️🪄✨</p>

<div class="links" id="ytBox">

  <!-- Main YouTube -->
  <div class="btn youtube mainYT" onclick="toggleYT()">
    <i class="fab fa-youtube"></i> YouTube
  </div>

  <!-- Sub buttons -->
  <div class="subs">
    <a class="sub-btn" href="https://www.youtube.com/@HelloSridhar" target="_blank">
      Hello Sridhar
      <small>Main</small>
    </a>

    <a class="sub-btn" href="https://www.youtube.com/@HelloSridharGaming" target="_blank">
      Hello Sridhar
      <small>Gaming</small>
    </a>
  </div>

</div>

<a class="btn instagram" onclick="resetYT()" href="https://www.instagram.com/hellosridhargaming?igsh=MTI0b2ZwMDQ0ajZ4OA==" target="_blank">
  <i class="fab fa-instagram"></i> Follow on Instagram
</a>

<a class="btn discord" onclick="resetYT()" href="https://discord.gg/2eaAVQ6hVM" target="_blank">
  <i class="fab fa-discord"></i> Join Our Community
</a>

</div>

<script>
function toggleYT(){
  document.getElementById("ytBox").classList.toggle("active");
}

function resetYT(){
  document.getElementById("ytBox").classList.remove("active");
}
</script>

</body>
</html>
